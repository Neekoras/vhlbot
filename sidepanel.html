<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VHLbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- ── Setup screen ── -->
  <div id="setup-screen" class="screen hidden">
    <div class="setup-card">
      <div class="setup-mark">V</div>
      <h1 class="setup-brand">VHLbot</h1>
      <p class="setup-sub">Paste your Anthropic API key to activate.</p>
      <input
        id="api-key-input"
        type="password"
        placeholder="sk-ant-..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="save-key-btn">Save & continue</button>
      <a href="https://console.anthropic.com/settings/keys" target="_blank" class="setup-link">
        Get a key →
      </a>
    </div>
  </div>

  <!-- ── Main screen ── -->
  <div id="main-screen" class="screen hidden">

    <header>
      <span class="brand">VHLbot</span>
      <div class="header-actions">
        <button id="analyze-btn" class="pill-btn">SCAN PAGE</button>
        <button id="settings-btn" class="gear-btn" title="Reset API key">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
            <path d="M13.3 6.6c.1.4.1.9 0 1.3l1.1 1-1.3 2.2-1.4-.4a5 5 0 0 1-1.1.6l-.3 1.5H8l-.3-1.5a5 5 0 0 1-1.1-.6l-1.4.4L3.9 9l1.1-1a5 5 0 0 1 0-1.3l-1.1-1 1.3-2.2 1.4.4a5 5 0 0 1 1.1-.6L8 1.8h2.2l.3 1.5a5 5 0 0 1 1.1.6l1.4-.4 1.3 2.2-1.1 1Z" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="chat-container">
      <div id="messages"></div>
    </div>

    <div id="input-area">
      <textarea
        id="user-input"
        placeholder="Ask a question..."
        rows="1"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" title="Send">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 12V2M2 7l5-5 5 5" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
