<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VHLbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- ── Setup screen ── -->
  <div id="setup-screen" class="screen hidden">
    <div class="setup-card">
      <div class="setup-mark">V</div>
      <h1 class="setup-brand">VHLbot</h1>
      <p class="setup-sub">Choose a provider and paste your API key.</p>

      <div class="provider-toggle">
        <button class="provider-opt active" data-provider="anthropic">Anthropic</button>
        <button class="provider-opt" data-provider="replicate">Replicate</button>
      </div>

      <input
        id="api-key-input"
        type="password"
        placeholder="sk-ant-..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="save-key-btn">Save & continue</button>
      <a id="get-key-link" href="https://console.anthropic.com/settings/keys" target="_blank" class="setup-link">Get a key →</a>
    </div>
  </div>

  <!-- ── Main screen ── -->
  <div id="main-screen" class="screen hidden">

    <header>
      <span class="brand">VHLbot</span>
      <div class="header-actions">
        <button id="autofill-btn" class="mode-pill">AUTOFILL</button>
        <button id="analyze-btn" class="mode-pill">SCANNING</button>
        <button id="settings-btn" class="gear-btn" title="Reset API key">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.5 9.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z" stroke="currentColor" stroke-width="1.1"/>
            <path d="M12.2 6.3c.1.4.1.8 0 1.2l1 .9-1.2 2-1.3-.4a4.6 4.6 0 0 1-1 .6l-.3 1.4H6.6l-.3-1.4a4.6 4.6 0 0 1-1-.6l-1.3.4-1.2-2 1-.9a4.6 4.6 0 0 1 0-1.2l-1-.9 1.2-2 1.3.4a4.6 4.6 0 0 1 1-.6L6.6 2h1.8l.3 1.4a4.6 4.6 0 0 1 1 .6l1.3-.4 1.2 2-1 .9Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="chat-container">
      <div id="messages"></div>
    </div>

    <div id="input-area">
      <textarea
        id="user-input"
        placeholder="Ask a question..."
        rows="1"
        spellcheck="false"
      ></textarea>
      <button id="send-btn" title="Send">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 10.5V1.5M1.5 6 6 1.5 10.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
